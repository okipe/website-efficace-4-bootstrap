# Netlify Configuration File
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "dist"
  command = "npm run build"

# ✅ Regla general: 1 día de cache (antes era 1 año ❌)
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ✅ HTML: Sin cache — siempre fresco tras cada deploy
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ✅ JS: Sin cache — el quiz y la lógica deben actualizarse siempre
[[headers]]
  for = "/js/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ✅ CSS: Sin cache — los estilos deben actualizarse siempre
[[headers]]
  for = "/css/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ✅ Imágenes: 30 días (no cambian frecuentemente)
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# ✅ Documentos PDF: 1 día (pueden actualizarse)
[[headers]]
  for = "/assets/documents/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ✅ Favicon e íconos: 1 año (prácticamente nunca cambian)
[[headers]]
  for = "/assets/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# ✅ Service Worker: Sin cache
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Redirects y rewrites
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/eficace/*"
  to = "/:splat"
  status = 301

[[redirects]]
  from = "/efficase/*"
  to = "/:splat"
  status = 301

[[redirects]]
  from = "/eficasse/*"
  to = "/:splat"
  status = 301

[[redirects]]
  from = "https://www.efficace.netlify.app/*"
  to = "https://efficace.netlify.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*.html"
  to = "/:splat"
  status = 301

[[redirects]]
  from = "/index"
  to = "/"
  status = 301

[[redirects]]
  from = "/recursos-ia"
  to = "/recursos-ia.html"
  status = 200

[[redirects]]
  from = "/ruta-empleable"
  to = "/ruta-empleable.html"
  status = 200

[[redirects]]
  from = "/galeria-cv"
  to = "/galeria-cv.html"
  status = 200

[[redirects]]
  from = "/guias-rapidas"
  to = "/guias-rapidas.html"
  status = 200

[[redirects]]
  from = "/contenido-inspiracion"
  to = "/contenido-inspiracion.html"
  status = 200

[[redirects]]
  from = "/portal-empleo"
  to = "/portal-empleo.html"
  status = 200

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true